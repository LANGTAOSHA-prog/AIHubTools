    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", Arial, sans-serif;
            background: radial-gradient(circle at 15% 0, rgba(124, 106, 252, .22), transparent 32%), radial-gradient(circle at 90% 0, rgba(224, 64, 251, .14), transparent 30%), #08090f;
            color: #f0f2ff;
            line-height: 1.85;
        }

        a {
            color: #c4b5fd;
            text-decoration: none;
        }

        .wrap {
            max-width: 1120px;
            margin: auto;
            padding: 24px 16px 70px;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 22px;
        }

        .brand {
            font-weight: 900;
        }

        .nav {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .nav a, .btn {
            border: 1px solid rgba(255, 255, 255, .16);
            background: rgba(255, 255, 255, .05);
            border-radius: 999px;
            color: #fff;
            padding: 9px 14px;
            font-size: 14px;
            font-weight: 800;
        }

        .hero, .card, .cover, .pn a, .pn .off {
            border: 1px solid rgba(255, 255, 255, .12);
            background: rgba(15, 17, 32, .86);
            box-shadow: 0 22px 52px rgba(0, 0, 0, .35);
        }

        .hero {
            border-radius: 30px;
            padding: 34px 26px;
            background: linear-gradient(135deg, rgba(124, 106, 252, .28), rgba(224, 64, 251, .1));
        }

        .badge, .pill, .chip {
            display: inline-flex;
            align-items: center;
            border-radius: 999px;
            font-weight: 900;
        }

        .badge {
            padding: 7px 12px;
            background: rgba(124, 106, 252, .18);
            color: #ddd6fe;
            font-size: 13px;
            margin-bottom: 14px;
        }

        h1 {
            font-size: clamp(34px, 6vw, 58px);
            line-height: 1.1;
            margin-bottom: 14px;
            letter-spacing: -.04em;
        }

        h2 {
            font-size: 24px;
            line-height: 1.35;
            margin-bottom: 13px;
        }

        .lead {
            color: #dbeafe;
            max-width: 850px;
            font-size: 17px;
        }

        .actions, .meta, .chips {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .actions, .meta {
            margin-top: 18px;
        }

        .btn.main {
            background: linear-gradient(135deg, #7c6afc, #e040fb);
            border: 0;
        }

        .pill {
            padding: 7px 11px;
            border: 1px solid rgba(255, 255, 255, .13);
            background: rgba(0, 0, 0, .16);
            font-size: 13px;
        }

        .score, .stars {
            color: #ffd166;
        }

        .cover {
            margin-top: 22px;
            border-radius: 28px;
            overflow: hidden;
            background: radial-gradient(circle at 20% 20%, rgba(255, 255, 255, .16), transparent 22%), linear-gradient(135deg, rgba(124, 106, 252, .55), rgba(224, 64, 251, .2), #111827);
        }

        .cover img {
            width: 100%;
            height: 320px;
            display: block;
            object-fit: cover;
        }

        .coverbox {
            min-height: 300px;
            display: flex;
            align-items: flex-end;
            padding: 28px;
        }

        .cover strong {
            display: block;
            font-size: clamp(32px, 5vw, 54px);
            line-height: 1.05;
        }

        .cover span {
            display: block;
            color: #e0e7ff;
            margin-top: 10px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1.25fr .75fr;
            gap: 20px;
            margin-top: 22px;
        }

        .card {
            border-radius: 22px;
            padding: 23px;
        }

        .list {
            padding-left: 20px;
        }

        .list li {
            margin: 7px 0;
            color: #e5e7eb;
        }

        .info {
            width: 100%;
            border-collapse: collapse;
        }

        .info td {
            border-bottom: 1px solid rgba(255, 255, 255, .08);
            padding: 10px 0;
        }

        .info td:first-child {
            width: 105px;
            color: #8b93b8;
            font-weight: 900;
        }

        .chip {
            padding: 6px 10px;
            background: rgba(124, 106, 252, .12);
            border: 1px solid rgba(124, 106, 252, .25);
            color: #c4b5fd;
            font-size: 12px;
        }

        .related {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }

        .related a {
            display: block;
            border: 1px solid rgba(255, 255, 255, .1);
            background: rgba(255, 255, 255, .045);
            border-radius: 16px;
            padding: 14px;
            color: #fff;
            min-height: 92px;
        }

        .related span, .pn span, .muted {
            display: block;
            color: #9ca3af;
            font-size: 13px;
        }

        .related em {
            display: block;
            font-style: normal;
            color: #cbd5e1;
            font-size: 13px;
            line-height: 1.55;
            margin-top: 4px;
        }

        .pn {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
            margin-top: 20px;
        }

        .pn a, .pn .off {
            border-radius: 18px;
            padding: 17px;
            min-height: 92px;
        }

        .pn small {
            display: block;
            color: #8b93b8;
            font-weight: 900;
            margin-bottom: 5px;
        }

        .notice {
            margin-top: 16px;
            padding: 14px;
            border-radius: 16px;
            background: rgba(255, 209, 102, .1);
            border: 1px solid rgba(255, 209, 102, .22);
            color: #fde68a;
        }

        .loading, .error {
            text-align: center;
            margin-top: 46px;
            padding: 30px;
            border: 1px dashed rgba(255, 255, 255, .16);
            border-radius: 20px;
            color: #8b93b8;
        }

        .footer {
            text-align: center;
            color: #8b93b8;
            font-size: 14px;
            margin-top: 30px;
        }

        @media (max-width: 820px) {
            .grid, .related, .pn {
                grid-template-columns: 1fr;
            }

            .hero, .card {
                padding: 20px;
            }

            .coverbox {
                min-height: 230px;
                padding: 22px;
            }

            .cover img {
                height: 230px;
            }

            .lang-switch {
                margin-top: 8px;
            }
        }

        .lang-switch {
            display: flex;
            gap: 6px;
        }

        .lang-switch a.is-active {
            background: linear-gradient(135deg, #7c6afc, #e040fb);
            border-color: #7c6afc;
        }
    </style>
</head>

                backTools: 'ツール一覧に戻る',
                prev: '前へ',
                next: '次へ',
                noItem: 'なし',

                featuredRecommend: '編集者のおすすめ、優先体験に適しています',
                tryRecommended: '必要に応じて試すのに適しています',

                coverFallback: '詳細ページカバー',
                codeScenarios: ['コード生成、説明、バグ修正', 'プロジェクト構造とファイル役割の理解', 'ウェブページ、ツール、自動化管理スクリプトの作成', '技術的問題をステップに分解'],
                imageScenarios: ['イラスト、ポスター、カバー、ビジュアル資料の生成', '記事やウェブサイト用の画像作成', 'スタイル、構図、配色の探求', 'テキストアイデアを画像下書きに変換'],
                videoScenarios: ['短いビデオアイデアとストーリーボードの生成', 'マーケティングやチュートリアルビデオの制作支援', '画像やテキストをビデオ資料に変換', 'ビデオ制作の参入门槛降低'],
                defaultScenarios: ['記事執筆、コピー編集、資料整理', '学習答疑と知識解説', 'オフィスコンテンツ生成、要約、表計算整理', 'アイデアをステップとプランに整理']
            }
        };

        function getText(key) {
            const lang = window.AIH_I18N ? window.AIH_I18N.getLang() : 'zh';
            const texts = UI_TEXT[lang] || UI_TEXT.zh;
            return texts[key] || UI_TEXT.zh[key] || key;
        }

        function clean(v) {
            return v == null ? '' : String(v).trim();
        }

        function esc(v) {
            return clean(v).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
        }

        function slugify(v) {
            return clean(v).toLowerCase().replace(/&/g, 'and').replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '');
        }

        function arr(d) {
            return Array.isArray(d) ? d : (d && Array.isArray(d.tools) ? d.tools : (d && Array.isArray(d.items) ? d.items : []));
        }

        function yes(v) {
            return v === true || ['true', '1', 'yes', '是', '推荐', 'featured'].includes(clean(v).toLowerCase());
        }

        function name(t) {
            return clean(t.name || t.name_zh || t.name_en || t.title || t.tool);
        }

        function slug(t) {
            return clean(t.slug || t.id || t.tool_slug || slugify(name(t)));
        }

        function cat(t) {
            return clean(t.category || t.category_zh || t.category_en || 'AI工具');
        }

        function typ(t) {
            return clean(t.type || t.type_zh || t.type_en || '在线工具');
        }

        function desc(t) {
            return clean(t.description || t.description_zh || t.description_en || t.summary || '这是 AIHubTools 收录的一款 AI 工具，适合提升学习、创作、办公或开发效率。');
        }

        function web(t) {
            return clean(t.website || t.url || t.link || t.source_url);
        }

        function price(t) {
            return clean(t.pricing || t.price || t.plan || '视官网为准');
        }

        function diff(t) {
            return clean(t.difficulty || t.level || '入门');
        }

        function hi(t) {
            return clean(t.highlight || t.highlight_zh || t.feature || '提升效率');
        }

        function tags(t) {
            let r = clean(t.tags || t.tags_zh || t.tags_en);
            return r ? r.split(/[,，、;；|]/).map(x => x.trim()).filter(Boolean) : [];
        }

        function tut(t) {
            return String(t.tutorial_enabled).toLowerCase() === 'true' && clean(t.tutorial_slug) ? './tutorials/' + clean(t.tutorial_slug) + '.html' : clean(t.tutorial_url);
        }

        function updated(t) {
            return clean(t.updated_at || t.last_updated || t.update_date || '2026-06-03');
        }

        function rating(t) {
            let r = parseFloat(clean(t.rating || t.score || t.editor_rating));
            if (!isNaN(r) && r > 0) return Math.max(1, Math.min(5, r)).toFixed(1);
            let s = (name(t) + cat(t)).split('').reduce((a, c) => a + c.charCodeAt(0), 0);
            return Math.min(4.9, 4.1 + (s % 8) / 10).toFixed(1);
        }

        function stars(r) {
            let n = Math.max(1, Math.min(5, Math.round(Number(r) || 4)));
            return '★★★★★'.slice(0, n) + '☆☆☆☆☆'.slice(0, 5 - n);
        }

        function link(t) {
            return './tool.html?slug=' + encodeURIComponent(slug(t));
        }

        function list(a) {
            return '<ul class="list">' + a.map(x => '<li>' + esc(x) + '</li>').join('') + '</ul>';
        }

        function cases(t) {
            let c = cat(t) + name(t);
            if (/Code|编程|开发/i.test(c)) return getText('codeScenarios');
            if (/Image|绘图|设计/i.test(c)) return getText('imageScenarios');
            if (/Video|视频/i.test(c)) return getText('videoScenarios');
            return getText('defaultScenarios');
        }

        function related(all, cur) {
            let s = slug(cur),
                c = cat(cur),
                manual = clean(cur.related_tools || cur.related).split(/[,，、;；|]/).filter(Boolean).map(k => all.find(t => slug(t) === k || slugify(name(t)) === slugify(k))).filter(Boolean),
                pool = [...manual, ...all.filter(t => slug(t) !== s && cat(t) === c), ...all.filter(t => slug(t) !== s)],
                seen = new Set();
            return pool.filter(t => {
                let x = slug(t);
                if (!x || seen.has(x) || x === s) return false;
                seen.add(x);
                return true;
            }).slice(0, 6).map(t => '<a href="' + link(t) + '"><strong>' + esc(name(t)) + '</strong><span>' + esc(cat(t)) + '</span><em>' + esc(hi(t) || desc(t).slice(0, 36)) + '</em></a>').join('');
        }

        function cover(t) {
            let explicit = clean(t.cover_image || t.cover || t.banner || t.hero_image || t.image),
                img = explicit || './assets/covers/' + slug(t) + '-cover.webp',
                fallback = '<div class="coverbox"><div><span>' + esc(getText('coverFallback')) + '</span><strong>' + esc(name(t)) + '</strong><span>' + esc(cat(t) + ' · ' + desc(t)) + '</span></div></div>';
            return '<section class="cover"><img src="' + esc(img) + '" alt="' + esc(name(t)) + ' ' + esc(getText('coverFallback')) + '" loading="lazy" onload="var x=this.nextElementSibling;if(x)x.remove()" onerror="this.remove()">' + fallback + '</section>';
        }

        function prevnext(all, cur) {
            let i = all.findIndex(t => slug(t) === slug(cur)),
                p = i > 0 ? all[i - 1] : null,
                n = i >= 0 && i < all.length - 1 ? all[i + 1] : null;
            let item = (lab, t) => t ? '<a href="' + link(t) + '"><small>' + lab + '</small><strong>' + esc(name(t)) + '</strong><span>' + esc(cat(t)) + '</span></a>' : '<div class="off"><small>' + lab + '</small><strong>' + esc(getText('noItem')) + '</strong><span>' + esc(getText('edgeReached')) + '</span></div>';
            return '<section class="pn">' + item(getText('prev'), p) + item(getText('next'), n) + '</section>';
        }

        function render(t, all) {
            let r = rating(t),
                tag = tags(t),
                site = web(t),
                tu = tut(t);
            document.title = name(t) + ' - AIHubTools';
            document.getElementById('app').innerHTML = `<section class="hero"><div class="badge">📄 ${esc(cat(t))} · ${esc(getText('info'))}</div><h1>${esc(name(t))}</h1><p class="lead">${esc(desc(t))}</p><div class="meta"><span class="pill">⭐ ${esc(getText('rating'))} <b class="score">${r}</b> / 5</span><span class="pill stars">${stars(r)}</span><span class="pill">🕒 ${esc(getText('updated'))} ${esc(updated(t))}</span><span class="pill">🏷️ ${esc(typ(t))}</span></div><div class="actions">${site ? `<a class="btn main" href="${esc(site)}" target="_blank" rel="noopener nofollow">${esc(getText('visitWebsite'))}</a>` : ''}${tu ? `<a class="btn" href="${esc(tu)}">${esc(getText('viewTutorial'))}</a>` : ''}<a class="btn" href="./index.html#tools-section">${esc(getText('backTools'))}</a></div></section>${cover(t)}<section class="grid"><div class="card"><h2>${esc(getText('scenarios'))}</h2>${list(cases(t))}</div><div class="card"><h2>${esc(getText('info'))}</h2><table class="info"><tr><td>${esc(getText('category'))}</td><td>${esc(cat(t))}</td></tr><tr><td>${esc(getText('type'))}</td><td>${esc(typ(t))}</td></tr><tr><td>${esc(getText('pricing'))}</td><td>${esc(price(t))}</td></tr><tr><td>${esc(getText('difficulty'))}</td><td>${esc(diff(t))}</td></tr><tr><td>${esc(getText('rating'))}</td><td>${r} / 5<span class="muted">${yes(t.featured) ? esc(getText('featuredRecommend')) : esc(getText('tryRecommended'))}</span></td></tr><tr><td>${esc(getText('updated'))}</td><td>${esc(updated(t))}</td></tr></table></div></section><section class="grid"><div class="card"><h2>${esc(getText('advantages'))}</h2>${list(getText('advantages'))}</div><div class="card"><h2>${esc(getText('tips'))}</h2>${list(getText('tips'))}</div></section><section class="card" style="margin-top:20px"><h2>${esc(getText('tags'))}</h2><div class="chips">${tag.length ? tag.map(x => '<span class="chip"># ' + esc(x) + '</span>').join('') : '<span class="chip">AI工具</span><span class="chip">效率工具</span>'}</div><div class="notice">${esc(getText('disclaimer'))}</div></section><section class="card" style="margin-top:20px"><h2>${esc(getText('related'))}</h2><div class="related">${related(all, t)}</div></section>${prevnext(all, t)}`;
        }

        async function init() {
            let app = document.getElementById('app');
            if (!slugParam && !nameParam) {
                app.innerHTML = '<div class="error" data-i18n="tool.missing_param">缺少工具参数，请从首页工具卡进入。</div>';
                return;
            }
            try {
                let res = await fetch(DATA_URL + '?v=' + Date.now(), { cache: 'no-store' });
                if (!res.ok) throw new Error('tools-data.json 读取失败');
                let all = arr(await res.json()).filter(name),
                    t = all.find(x => slug(x) === slugParam || slugify(name(x)) === slugParam || name(x).toLowerCase() === nameParam.toLowerCase());
                if (!t) {
                    app.innerHTML = '<div class="error" data-i18n="tool.not_found">没有找到这个工具，请检查链接。</div>';
                    return;
                }
                render(t, all);
            } catch (e) {
                app.innerHTML = '<div class="error">' + esc(getText('load_error')) + e.message + '</div>';
            }
        }

        init();
        document.getElementById('year').textContent = new Date().getFullYear();
    </script>
</body>
</html>
