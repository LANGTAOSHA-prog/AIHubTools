<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>工具详情 - AIHubTools 智汇工具</title>
  <meta name="description" content="AIHubTools 智汇工具的 AI 工具详情页，展示工具介绍、分类、标签、官网、教程和相关工具推荐。" />
  <meta name="robots" content="index, follow" />
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#08090f;--surface:#0f1120;--surface2:#151829;--border:rgba(255,255,255,.08);--border2:rgba(255,255,255,.16);--text:#f0f2ff;--muted:#8b93b8;--accent:#7c6afc;--accent2:#e040fb;--green:#00d68f;--yellow:#ffd166;--red:#ff6b6b;--radius:22px;--shadow:0 22px 52px rgba(0,0,0,.42)}
    body{font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",Arial,sans-serif;background:radial-gradient(ellipse 70% 55% at 15% 8%,rgba(124,106,252,.18),transparent 60%),radial-gradient(ellipse 55% 45% at 86% 4%,rgba(224,64,251,.13),transparent 60%),var(--bg);color:var(--text);line-height:1.85;min-height:100vh}
    a{color:#c4b5fd;text-decoration:none}.wrap{max-width:1120px;margin:0 auto;padding:24px 16px 72px}.topbar{display:flex;justify-content:space-between;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:24px}.brand{display:flex;align-items:center;gap:10px;font-weight:900}.logo{width:38px;height:38px;border-radius:12px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:grid;place-items:center;box-shadow:0 0 22px rgba(124,106,252,.35)}.nav{display:flex;gap:10px;flex-wrap:wrap}.nav a{padding:9px 14px;border-radius:999px;border:1px solid var(--border2);background:rgba(255,255,255,.05);color:var(--text);font-size:14px;font-weight:800}
    .hero{position:relative;overflow:hidden;border:1px solid var(--border2);border-radius:30px;padding:38px 28px;background:linear-gradient(135deg,rgba(124,106,252,.22),rgba(224,64,251,.10));box-shadow:var(--shadow)}.hero::after{content:"";position:absolute;inset:auto -90px -140px auto;width:300px;height:300px;border-radius:50%;background:radial-gradient(circle,rgba(124,106,252,.22),transparent 70%);pointer-events:none}.badge{display:inline-flex;align-items:center;gap:8px;padding:7px 12px;border-radius:999px;border:1px solid rgba(196,181,253,.26);background:rgba(124,106,252,.18);color:#ddd6fe;font-size:13px;font-weight:900;margin-bottom:16px}h1{font-size:clamp(34px,6vw,58px);line-height:1.1;letter-spacing:-.045em;margin-bottom:14px}.lead{font-size:17px;color:#dbeafe;max-width:760px}.hero-actions{display:flex;gap:12px;flex-wrap:wrap;margin-top:22px}.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:12px 18px;border-radius:999px;font-size:14px;font-weight:900}.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;box-shadow:0 0 26px rgba(124,106,252,.28)}.btn-ghost{border:1px solid var(--border2);background:rgba(255,255,255,.05);color:#fff}
    .grid{display:grid;grid-template-columns:1.25fr .75fr;gap:20px;margin-top:22px}.card{background:rgba(15,17,32,.88);border:1px solid var(--border);border-radius:var(--radius);padding:24px;box-shadow:var(--shadow)}h2{font-size:24px;line-height:1.3;margin-bottom:14px;letter-spacing:-.02em}.muted{color:var(--muted)}.chips{display:flex;gap:8px;flex-wrap:wrap}.chip{display:inline-flex;align-items:center;gap:5px;padding:6px 10px;border-radius:999px;font-size:12px;font-weight:900;background:rgba(124,106,252,.12);border:1px solid rgba(124,106,252,.24);color:#c4b5fd}.chip-green{background:rgba(0,214,143,.10);border-color:rgba(0,214,143,.24);color:#86efac}.list{padding-left:20px}.list li{margin:8px 0;color:#e5e7eb}.info-table{width:100%;border-collapse:collapse}.info-table td{border-bottom:1px solid var(--border);padding:11px 0;vertical-align:top}.info-table td:first-child{width:110px;color:var(--muted);font-weight:800}.related{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.related a{display:block;background:rgba(255,255,255,.045);border:1px solid var(--border);border-radius:16px;padding:14px;color:var(--text);transition:.18s}.related a:hover{border-color:rgba(124,106,252,.42);transform:translateY(-2px)}.related strong{display:block;font-size:15px;margin-bottom:4px}.related span{font-size:12px;color:var(--muted)}.notice{margin-top:18px;padding:15px 16px;border-radius:16px;background:rgba(255,209,102,.10);border:1px solid rgba(255,209,102,.22);color:#fde68a}.loading,.error{text-align:center;margin-top:48px;padding:34px;border:1px dashed var(--border2);border-radius:22px;background:rgba(15,17,32,.7);color:var(--muted)}.footer{text-align:center;color:var(--muted);font-size:14px;margin-top:32px}
    @media(max-width:820px){.grid{grid-template-columns:1fr}.related{grid-template-columns:1fr}.hero,.card{padding:20px}.wrap{padding:16px 12px 48px}}
  </style>
</head>
<body>
  <main class="wrap">
    <div class="topbar">
      <div class="brand"><span class="logo">AI</span><span>AIHubTools 智汇工具</span></div>
      <nav class="nav"><a href="./index.html">返回首页</a><a href="./tutorials.html">教程中心</a></nav>
    </div>
    <div id="app"><div class="loading">正在加载工具详情...</div></div>
    <div class="footer">© 2026 AIHubTools / 智汇工具 · AI工具导航与教程中心</div>
  </main>
  <script>
    const DATA_URL = './tools-data.json';
    const qs = new URLSearchParams(location.search);
    const slugParam = clean(qs.get('slug') || qs.get('id') || '');
    const nameParam = clean(qs.get('name') || '');

    function clean(v){ return v === undefined || v === null ? '' : String(v).trim(); }
    function esc(v){ return clean(v).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
    function escA(v){ return esc(v).replace(/`/g,'&#96;'); }
    function normalizeData(d){ if(Array.isArray(d)) return d; if(d && Array.isArray(d.tools)) return d.tools; if(d && Array.isArray(d.items)) return d.items; if(d && Array.isArray(d.data)) return d.data; return []; }
    function slugify(v){ return clean(v).toLowerCase().replace(/&/g,'and').replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,''); }
    function bool(v){ if(typeof v === 'boolean') return v; return ['true','1','yes','y','是','推荐','featured'].includes(clean(v).toLowerCase()); }
    function getName(t){ return clean(t.name || t.name_zh || t.name_en || t.name_ja || t.title || t.tool); }
    function getSlug(t){ return clean(t.slug || t.id || t.tool_slug || t.tutorial_slug || slugify(getName(t))); }
    function getCategory(t){ return clean(t.category || t.category_zh || t.category_en || t.category_ja || 'AI工具'); }
    function getType(t){ return clean(t.type || t.type_zh || t.type_en || t.type_ja || '在线工具'); }
    function getDesc(t){ return clean(t.description || t.description_zh || t.description_en || t.description_ja || t.desc || t.summary || '这是 AIHubTools 收录的一款 AI 工具，适合用于提升学习、创作、办公或开发效率。'); }
    function getWebsite(t){ return clean(t.website || t.url || t.link || t.source_url); }
    function getPricing(t){ return clean(t.pricing || t.price || t.pricing_zh || t.plan || '视官网为准'); }
    function getDifficulty(t){ return clean(t.difficulty || t.level || t.skill_level || '入门'); }
    function getHighlight(t){ return clean(t.highlight || t.highlight_zh || t.highlight_en || t.feature || '提升效率'); }
    function getTags(t){ const raw = clean(t.tags || t.tags_zh || t.tags_en || t.tags_ja || ''); return raw ? raw.split(/[,，、;；|]/).map(x => x.trim()).filter(Boolean) : []; }
    function tutorialUrl(t){ if(String(t.tutorial_enabled).toLowerCase() === 'true' && clean(t.tutorial_slug)) return './tutorials/' + clean(t.tutorial_slug) + '.html'; if(clean(t.tutorial_url)) return clean(t.tutorial_url); return ''; }

    function makeUseCases(tool){
      const cat = getCategory(tool), name = getName(tool);
      if(/编程|Coding|Code|开发/i.test(cat + name)) return ['代码生成、代码解释和 Bug 排查','快速理解项目结构和文件作用','辅助创建网页、小工具和自动化脚本','把复杂技术问题整理成可执行步骤'];
      if(/绘图|Image|设计|Design/i.test(cat + name)) return ['生成插画、海报、封面和视觉素材','为文章、网站或社交媒体制作配图','探索不同风格、构图和配色方案','把文字创意快速变成图片草图'];
      if(/视频|Video/i.test(cat + name)) return ['生成短视频创意和分镜','辅助制作营销视频或教学内容','把图片或文字转化为视频素材','降低视频创作的入门门槛'];
      if(/搜索|Search|研究/i.test(cat + name)) return ['资料查询和信息整理','带来源的学习研究','快速比较不同观点和资料','为文章或报告收集参考信息'];
      return ['写文章、改文案和整理资料','学习问题答疑和知识点解释','办公内容生成、总结和表格整理','把想法整理成清晰的步骤和方案'];
    }
    function makePros(tool){
      const highlight = getHighlight(tool);
      return [highlight || '能明显提升日常效率', '上手门槛相对较低，适合新手尝试', '适合与其他 AI 工具组合成工作流', '可以减少重复劳动，把时间留给判断和创意'];
    }
    function makeTips(){
      return ['第一次使用时，先用一个简单任务测试输出效果。','提问时尽量写清楚背景、目标、输出格式和限制。','重要内容不要完全依赖 AI 结果，发布前需要自己检查。','涉及价格、版权、隐私或商业用途时，请以官网说明为准。'];
    }

    function cardList(items){ return '<ul class="list">' + items.map(x => '<li>' + esc(x) + '</li>').join('') + '</ul>'; }
    function renderRelated(all, current){
      const cat = getCategory(current), slug = getSlug(current);
      const related = all.filter(t => getSlug(t) !== slug && getCategory(t) === cat).slice(0,3);
      const list = related.length ? related : all.filter(t => getSlug(t) !== slug).slice(0,3);
      return list.map(t => '<a href="./tool.html?slug=' + escA(getSlug(t)) + '"><strong>' + esc(getName(t)) + '</strong><span>' + esc(getCategory(t)) + '</span></a>').join('');
    }

    function render(tool, all){
      const name = getName(tool), cat = getCategory(tool), type = getType(tool), desc = getDesc(tool);
      const site = getWebsite(tool), pricing = getPricing(tool), diff = getDifficulty(tool), tags = getTags(tool), tut = tutorialUrl(tool);
      document.title = name + ' 工具详情 - AIHubTools 智汇工具';
      const meta = document.querySelector('meta[name="description"]');
      if(meta) meta.setAttribute('content', name + ' 工具详情：' + desc.slice(0,120));
      document.getElementById('app').innerHTML = `
        <section class="hero">
          <div class="badge">📄 ${esc(cat)} · 工具详情</div>
          <h1>${esc(name)}</h1>
          <p class="lead">${esc(desc)}</p>
          <div class="hero-actions">
            ${site ? `<a class="btn btn-primary" href="${escA(site)}" target="_blank" rel="noopener nofollow">访问官网 →</a>` : ''}
            ${tut ? `<a class="btn btn-ghost" href="${escA(tut)}">查看教程</a>` : ''}
            <a class="btn btn-ghost" href="./index.html#tools-section">返回工具库</a>
          </div>
        </section>
        <section class="grid">
          <div class="card"><h2>适合使用场景</h2>${cardList(makeUseCases(tool))}</div>
          <div class="card"><h2>工具信息</h2><table class="info-table">
            <tr><td>分类</td><td>${esc(cat)}</td></tr>
            <tr><td>类型</td><td>${esc(type)}</td></tr>
            <tr><td>价格</td><td>${esc(pricing)}</td></tr>
            <tr><td>难度</td><td>${esc(diff)}</td></tr>
            <tr><td>推荐</td><td>${bool(tool.featured) ? '编辑推荐' : '普通收录'}</td></tr>
          </table></div>
        </section>
        <section class="grid">
          <div class="card"><h2>主要优点</h2>${cardList(makePros(tool))}</div>
          <div class="card"><h2>新手使用建议</h2>${cardList(makeTips())}</div>
        </section>
        <section class="card" style="margin-top:20px">
          <h2>标签</h2>
          <div class="chips">${tags.length ? tags.map(x => '<span class="chip"># ' + esc(x) + '</span>').join('') : '<span class="chip">AI工具</span><span class="chip">效率工具</span>'}</div>
          <div class="notice">本站仅做工具导航和学习整理，工具名称、Logo、商标及服务内容归原平台所有。价格、功能和可用性可能变化，请以官网为准。</div>
        </section>
        <section class="card" style="margin-top:20px">
          <h2>相关工具</h2>
          <div class="related">${renderRelated(all, tool)}</div>
        </section>`;
    }

    async function init(){
      const app = document.getElementById('app');
      if(!slugParam && !nameParam){
        app.innerHTML = '<div class="error">缺少工具参数。请从首页工具卡进入，或使用 <code>tool.html?slug=chatgpt</code> 访问。</div>';
        return;
      }
      try{
        const res = await fetch(DATA_URL + '?v=' + Date.now(), {cache:'no-store'});
        if(!res.ok) throw new Error('tools-data.json 读取失败');
        const all = normalizeData(await res.json()).filter(t => getName(t));
        const target = all.find(t => getSlug(t) === slugParam || slugify(getName(t)) === slugParam || getName(t).toLowerCase() === nameParam.toLowerCase());
        if(!target){
          app.innerHTML = '<div class="error">没有找到这个工具。请检查 slug 是否正确，或返回首页重新进入。</div>';
          return;
        }
        render(target, all);
      }catch(e){
        app.innerHTML = '<div class="error">工具详情加载失败：' + esc(e.message) + '</div>';
      }
    }
    init();
  </script>
</body>
</html>
