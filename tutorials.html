<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>教程中心 - AIHubTools 智汇工具</title>
  <meta name="description" content="AIHubTools 教程中心，整理 AI 工具使用教程、AI写作、AI绘图、AI视频、AI办公和AI编程教程。">
  <style>
    body{margin:0;font-family:Arial,"Microsoft YaHei",sans-serif;background:#f8fafc;color:#111827}
    header{background:linear-gradient(135deg,#2563eb,#7c3aed);color:white;text-align:center;padding:60px 20px}
    header h1{font-size:42px;margin:0 0 12px}
    header p{font-size:18px;margin:0;opacity:.95}
    nav{background:white;padding:14px 20px;text-align:center;box-shadow:0 2px 10px rgba(0,0,0,.06);position:sticky;top:0;z-index:10}
    nav a{margin:0 12px;color:#2563eb;text-decoration:none;font-weight:700}
    .wrap{max-width:1100px;margin:0 auto;padding:36px 18px}
    .section-title{font-size:28px;margin-bottom:10px}
    .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
    .card{background:white;border-radius:18px;padding:22px;box-shadow:0 8px 24px rgba(15,23,42,.08)}
    .tag{display:inline-block;background:#eef2ff;color:#3730a3;padding:6px 10px;border-radius:999px;font-size:12px;margin-bottom:12px}
    .card h3{margin:0 0 10px;font-size:21px}
    .card p{color:#4b5563;line-height:1.7;font-size:14px}
    .btn{display:inline-block;margin-top:12px;background:#2563eb;color:white;text-decoration:none;padding:10px 14px;border-radius:10px;font-weight:700}
    .loading,.empty{background:white;border-radius:16px;padding:24px;text-align:center;color:#6b7280}
    footer{text-align:center;color:#6b7280;padding:30px 15px}
    @media(max-width:800px){.grid{grid-template-columns:1fr}header h1{font-size:32px}}
  </style>
</head>
<body>

<header>
  <h1>教程中心</h1>
  <p>整理实用的 AI 工具使用方法、操作步骤和效率技巧</p>
</header>

<nav>
  <a href="index.html">首页</a>
  <a href="index.html#tools">工具列表</a>
  <a href="tutorials.html">教程中心</a>
  <a href="index.html#about">关于本站</a>
</nav>

<main class="wrap">
  <h2 class="section-title">最新教程</h2>
  <div id="status" class="loading">正在加载教程数据...</div>
  <div id="tutorialGrid" class="grid"></div>
</main>

<footer>
  © 2026 AIHubTools 智汇工具 · AI工具导航与教程中心
</footer>

<script>
const DATA_URL = './tutorials-data.json';

function clean(v){
  return v === undefined || v === null ? '' : String(v).trim();
}

function escapeHtml(v){
  return clean(v)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#39;');
}

function escapeAttr(v){
  return escapeHtml(v).replace(/`/g,'&#96;');
}

function normalizeData(data){
  if(Array.isArray(data)) return data;
  if(data && Array.isArray(data.tutorials)) return data.tutorials;
  return [];
}

async function loadTutorials(){
  const status = document.getElementById('status');
  const grid = document.getElementById('tutorialGrid');

  try{
    const res = await fetch(DATA_URL + '?v=' + Date.now(), {cache:'no-store'});
    if(!res.ok) throw new Error('HTTP ' + res.status);

    const data = await res.json();
    const tutorials = normalizeData(data);

    if(!tutorials.length){
      status.className = 'empty';
      status.textContent = '暂时还没有教程。';
      return;
    }

    status.style.display = 'none';

    grid.innerHTML = tutorials.map(t => {
      const category = clean(t.category || 'AI工具教程');
      const title = clean(t.title || 'AI工具教程');
      const summary = clean(t.summary || '查看这篇教程，了解该工具的基础用法和实用技巧。');
      const slug = clean(t.slug);
      const url = './tutorials/' + slug + '.html';

      return `
        <article class="card">
          <span class="tag">${escapeHtml(category)}</span>
          <h3>${escapeHtml(title)}</h3>
          <p>${escapeHtml(summary)}</p>
          <a class="btn" href="${escapeAttr(url)}">查看教程</a>
        </article>
      `;
    }).join('');

  }catch(err){
    status.className = 'empty';
    status.textContent = '教程数据读取失败：' + err.message;
  }
}

loadTutorials();
</script>

</body>
</html>
