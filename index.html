<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>AIHubTools 智汇工具 - AI工具导航</title>
  <meta name="description" content="AIHubTools 智汇工具，精选 AI 工具导航、教程中心和工具详情页。">
  <style>
    body{margin:0;background:#08090f;color:#f0f2ff;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",Arial,sans-serif;min-height:100vh;display:grid;place-items:center;padding:24px}.box{max-width:760px;text-align:center}.loader{width:42px;height:42px;border:4px solid rgba(255,255,255,.18);border-top-color:#7c6afc;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 18px}@keyframes spin{to{transform:rotate(360deg)}}a{color:#c4b5fd}
  </style>
</head>
<body>
  <div class="box"><div class="loader"></div><h1>AIHubTools 正在加载...</h1><p>如果页面长时间没有打开，请刷新一次。</p></div>
  <script>
    const SOURCE_URL = 'https://raw.githubusercontent.com/LANGTAOSHA-prog/AIHubTools/c571a1d9bd37b60f4b7fc4254c5645cb4fb3a350/index.html';
    function safeText(el){return (el && el.textContent ? el.textContent : '').trim();}
    function detailHref(name){return './tool.html?name=' + encodeURIComponent(String(name||'').trim());}
    function patchHomeHtml(html){
      const patchCss = '.aihub-tutorial-entry{display:inline-flex!important;align-items:center;gap:6px;text-decoration:none!important;background:linear-gradient(135deg,rgba(124,106,252,.18),rgba(224,64,251,.14))!important;border:1px solid rgba(124,106,252,.45)!important;color:var(--text,#fff)!important}.aihub-tutorial-entry:hover{border-color:rgba(224,64,251,.75)!important;transform:translateY(-1px)}@media(max-width:720px){.aihub-tutorial-entry{justify-content:center}}';
      if(!html.includes('aihub-tutorial-entry')) html = html.replace('</style>', patchCss + '</style>');
      const entry = '<a class="rand-btn aihub-tutorial-entry" href="./tutorials.html" aria-label="进入 AIHubTools 教程中心">📖 <span>教程中心</span></a>';
      const target = '<button class="rand-btn" onclick="showRandom()">🎲 <span data-i18n="rand_btn">随机发现</span></button>';
      if(!html.includes('aihub-tutorial-entry') && html.includes(target)) html = html.replace(target, entry + '\n      ' + target);
      return html;
    }
    function addToolsTutorialEntry(){
      var tools=document.getElementById('tools-section');
      if(!tools) return;
      var right=tools.querySelector('.sh .sh-right');
      if(!right) return;
      if(right.querySelector('.aihub-tutorial-entry')) return;
      var link=document.createElement('a');
      link.className='rand-btn aihub-tutorial-entry';
      link.href='./tutorials.html';
      link.innerHTML='📖 <span>教程中心</span>';
      link.setAttribute('aria-label','进入 AIHubTools 教程中心');
      right.insertBefore(link,right.firstChild);
    }
    function addDetailButtons(){
      document.querySelectorAll('.tool-card').forEach(function(card){
        var name = safeText(card.querySelector('.tool-name'));
        if(!name) return;
        var footer = card.querySelector('.tool-footer');
        if(!footer){footer=document.createElement('div');footer.className='tool-footer';card.appendChild(footer);}
        var link = card.querySelector('.tc-detail-btn');
        if(!link){
          link=document.createElement('a');
          link.className='tc-btn tc-btn-outline tc-detail-btn';
          link.textContent='📄 详情';
          link.style.borderColor='rgba(124,106,252,.45)';
          link.style.color='var(--text,#fff)';
          footer.insertBefore(link, footer.children.length>1 ? footer.children[1] : null);
        }
        link.href=detailHref(name);
        link.setAttribute('aria-label', name + ' 详情页');
      });
    }
    function startDetailPatch(){
      addToolsTutorialEntry();
      addDetailButtons();
      setTimeout(function(){addToolsTutorialEntry();addDetailButtons();},100);
      setTimeout(function(){addToolsTutorialEntry();addDetailButtons();},500);
      setTimeout(function(){addToolsTutorialEntry();addDetailButtons();},1200);
      setInterval(function(){addToolsTutorialEntry();addDetailButtons();},1500);
      try{new MutationObserver(function(){addToolsTutorialEntry();addDetailButtons();}).observe(document.body,{childList:true,subtree:true});}catch(e){}
    }
    async function loadHome(){
      try{
        const res = await fetch(SOURCE_URL, {cache:'no-store'});
        if(!res.ok) throw new Error('HTTP ' + res.status);
        let html = await res.text();
        html = patchHomeHtml(html);
        document.open();
        document.write(html);
        document.close();
        setTimeout(startDetailPatch,0);
      }catch(err){
        document.body.innerHTML = '<div class="box"><h1>首页加载失败</h1><p>请稍后刷新，或进入 <a href="tutorials.html">教程中心</a> / <a href="tool.html?name=ChatGPT">ChatGPT详情页</a>。</p><p style="opacity:.65">' + String(err.message).replace(/[<>]/g,'') + '</p></div>';
      }
    }
    loadHome();
  </script>
</body>
</html>
